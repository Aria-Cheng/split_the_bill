<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans+TC:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F1;
    --paper-deep:#F1ECE1;
    --line:#DED5C0;
    --ink:#262220;
    --ink-soft:#7A736A;
    --indigo:#2F4A5E;
    --indigo-deep:#213847;
    --rust:#A6491F;
    --sage:#6F7F5C;
    --stamp:#A63A2C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .app{
    max-width:1040px;
    margin:0 auto;
    padding:32px 20px 80px;
  }
  @media (max-width:560px){
    .app{ padding:20px 14px 60px; }
    .panel{ padding:16px; }
  }
  header.top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;
    margin-bottom:24px;
    flex-wrap:wrap;
    gap:8px;
  }
  header.top h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:32px;
    letter-spacing:0.01em;
    margin:0;
  }
  header.top .sub{
    font-size:13px;
    color:var(--ink-soft);
    letter-spacing:0.02em;
  }
  @media (max-width:560px){
    header.top{
      flex-direction:column;
      align-items:flex-start;
    }
    header.top h1{ font-size:26px; }
  }

  /* Project tabs styled like ledger dividers */
  .project-rail{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-bottom:28px;
    align-items:center;
  }
  .project-tab{
    padding:8px 16px;
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:3px 3px 0 0;
    font-size:14px;
    cursor:pointer;
    color:var(--ink-soft);
    position:relative;
    transition:all .15s ease;
  }
  .project-tab:hover{ color:var(--ink); }
  .project-tab.active{
    background:var(--paper-deep);
    color:var(--ink);
    border-color:var(--line);
    font-weight:500;
  }
  .project-tab.active::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-1px;
    height:2px;
    background:var(--indigo);
  }
  .project-tab .share{
    margin-left:8px;
    opacity:0.55;
    cursor:pointer;
  }
  .project-tab .share:hover{ opacity:1; }
  .project-tab .del{
    margin-left:6px;
    color:var(--ink-soft);
    opacity:0.5;
  }
  .project-tab .del:hover{ opacity:1; color:var(--rust); }
  .add-project{
    padding:8px 14px;
    border:1px dashed var(--line);
    border-radius:3px 3px 0 0;
    background:none;
    font-size:14px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .add-project:hover{ color:var(--indigo); border-color:var(--indigo); }

  .empty{
    padding:60px 20px;
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
  }

  .panel{
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-radius:4px;
    padding:24px;
  }

  .section-label{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 12px;
  }

  /* Members */
  .members-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:8px;
  }
  .chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 12px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:20px;
    font-size:13px;
  }
  .chip .x{
    cursor:pointer;
    color:var(--ink-soft);
    font-size:12px;
  }
  .chip .x:hover{ color:var(--rust); }
  .add-member-form{
    display:flex;
    gap:8px;
    margin-top:4px;
  }
  .add-member-form input{
    flex:1;
    max-width:200px;
  }

  input[type=text], input[type=number], input[type=date]{
    font-family:inherit;
    font-size:14px;
    padding:9px 12px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--paper);
    color:var(--ink);
  }
  input:focus, select:focus, button:focus-visible{
    outline:2px solid var(--indigo);
    outline-offset:1px;
  }
  select{
    font-family:inherit;
    font-size:14px;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--paper);
    color:var(--ink);
  }
  button.primary{
    font-family:inherit;
    font-size:14px;
    padding:9px 18px;
    border:1px solid var(--indigo);
    border-radius:3px;
    background:var(--indigo);
    color:var(--paper);
    cursor:pointer;
    transition:background .15s ease;
  }
  button.primary:hover{ background:var(--indigo-deep); }
  button.ghost{
    font-family:inherit;
    font-size:13px;
    padding:8px 14px;
    border:1px solid var(--line);
    border-radius:3px;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
  }
  button.ghost:hover{ color:var(--ink); border-color:var(--ink-soft); }

  /* torn divider — signature element */
  .tear{
    height:1px;
    margin:28px 0;
    background-image:repeating-linear-gradient(to right, var(--line) 0 6px, transparent 6px 12px);
  }

  /* Expense form — mobile-first: always stacked, single column */
  .expense-form{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:14px;
  }
  .expense-form input, .expense-form select{
    width:100%;
  }
  .row-2col{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .row-2col > *{ flex:1; min-width:0; }
  .split-options{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:6px;
  }
  .split-pill{
    padding:6px 12px;
    border:1px solid var(--line);
    border-radius:20px;
    font-size:12.5px;
    cursor:pointer;
    background:var(--paper);
    color:var(--ink-soft);
    user-select:none;
  }
  .split-pill.on{
    background:var(--indigo);
    border-color:var(--indigo);
    color:var(--paper);
  }
  .expense-form .actions{
    display:flex;
    justify-content:flex-end;
    margin-top:4px;
  }

  /* Receipt list — card layout, no grid math to break */
  .receipt{
    border-top:1px solid var(--line);
  }
  .expense-card{
    padding:14px 4px;
    border-bottom:1px dashed var(--line);
  }
  .expense-card-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10px;
  }
  .expense-card-top .item{
    font-weight:600;
    font-size:14.5px;
  }
  .expense-card-top .amount{
    font-family:'IBM Plex Mono', monospace;
    font-weight:700;
    font-size:14.5px;
    white-space:nowrap;
  }
  .expense-card-meta{
    color:var(--ink-soft);
    font-size:12.5px;
    margin-top:4px;
  }
  .expense-card-split{
    color:var(--ink-soft);
    font-size:12px;
    margin-top:4px;
    line-height:1.5;
  }
  .expense-card-bottom{
    display:flex;
    justify-content:flex-end;
    margin-top:8px;
  }
  .expense-card-bottom .del{
    color:var(--ink-soft);
    font-size:12.5px;
    cursor:pointer;
    padding:4px 8px;
  }
  .expense-card-bottom .del:hover{ color:var(--rust); }
  .receipt-empty{
    padding:24px 4px;
    color:var(--ink-soft);
    font-size:13.5px;
  }

  /* Settlement */
  .settlement{
    margin-top:8px;
  }
  .balance-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 4px;
    font-size:13.5px;
    border-bottom:1px solid var(--line);
  }
  .balance-row .name{ font-weight:500; }
  .balance-row .val{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
  }
  .val.pos{ color:var(--sage); }
  .val.neg{ color:var(--rust); }
  .val.zero{ color:var(--ink-soft); }

  .transfer-list{
    margin-top:16px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .transfer{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    padding:10px 14px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    flex-wrap:wrap;
  }
  .transfer .arrow{ color:var(--ink-soft); }
  .transfer .amt{
    margin-left:auto;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    color:var(--rust);
  }

  .stamp{
    display:inline-block;
    transform:rotate(-6deg);
    border:2px solid var(--stamp);
    color:var(--stamp);
    font-weight:700;
    font-size:12px;
    letter-spacing:0.08em;
    padding:3px 10px;
    border-radius:4px;
    margin-left:10px;
  }

  .grid-two{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
  }
  @media (max-width:720px){
    .grid-two{ grid-template-columns:1fr; }
  }
  /* wider screens: let the add-expense fields sit side by side instead of always stacked */
  @media (min-width:640px){
    .expense-form .row-2col{ flex-direction:row; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <h1>分帳本</h1>
    </div>
  </header>

  <div id="syncStatus" style="font-size:12px;color:var(--ink-soft);margin-bottom:16px;"></div>

  <div class="project-rail" id="projectRail"></div>

  <div id="mainArea"></div>
</div>

<script>
(function(){
  // ---------- backend connection ----------
  // 把你部署好的 Google Apps Script 網頁應用程式網址貼在這裡的引號中間
  // 例如: const API_URL = "https://script.google.com/macros/s/AKfycb.../exec";
  const API_URL = "https://script.google.com/macros/s/AKfycbxfoFFagrPflp87wUqDB-6mDLht0umkhlKVSduLbOgddrdh5rx6PNUf9Dy-3geBvpTu0w/exec";

  // ---------- guest mode ----------
  // 如果網址帶有 ?project=xxxx，代表這是分享給朋友的連結：
  // 只顯示、只讀寫這一個專案，不出現專案列表、不能新增或刪除專案。
  const guestProjectId = new URLSearchParams(window.location.search).get('project');
  const isGuest = !!guestProjectId;

  // ---------- state ----------
  let state = {
    projects: [],
    currentId: null
  };
  let editingSplit = new Set(); // temp selection for the add-expense form
  let syncing = false;

  function uid(){ return Math.random().toString(36).slice(2,9); }
  function fmt(n){
    return 'NT$ ' + Math.round(n).toLocaleString('zh-Hant-TW');
  }
  function fmtDate(dateStr){
    // defensive: backend/sheet may hand back a plain "2026-07-17" or a full
    // ISO timestamp — always reduce it to a short, human date like "7/17"
    const d = new Date(dateStr);
    if(isNaN(d.getTime())) return dateStr;
    return (d.getMonth() + 1) + '/' + d.getDate();
  }

  function currentProject(){
    return state.projects.find(p => p.id === state.currentId) || null;
  }

  function setSyncing(v){
    syncing = v;
    renderSyncStatus();
  }
  function renderSyncStatus(){
    const el = document.getElementById('syncStatus');
    if(!API_URL){
      el.innerHTML = '尚未連接 Google Sheet — 資料只存在這個瀏覽器分頁，重新整理就會消失。把 Apps Script 網址貼進程式碼最上方的 API_URL 即可自動同步。';
      return;
    }
    el.innerHTML = syncing ? '同步中…' : '已連接 Google Sheet・資料自動同步';
  }

  async function callApi(action, payload){
    setSyncing(true);
    try{
      const url = isGuest ? `${API_URL}?project=${encodeURIComponent(guestProjectId)}` : API_URL;
      const res = await fetch(url, {
        method: 'POST',
        body: JSON.stringify({ action, ...payload }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const data = await res.json();
      return data;
    } catch(err){
      alert('連線到 Google Sheet 失敗，請確認 Apps Script 部署設定：' + err.message);
      return null;
    } finally {
      setSyncing(false);
    }
  }

  async function loadFromSheet(){
    if(!API_URL){ render(); return; }
    setSyncing(true);
    try{
      const url = isGuest ? `${API_URL}?project=${encodeURIComponent(guestProjectId)}` : API_URL;
      const res = await fetch(url);
      const data = await res.json();
      state.projects = data.projects || [];
      if(isGuest){
        state.currentId = state.projects.length ? state.projects[0].id : null;
      } else if(!state.projects.find(p => p.id === state.currentId)){
        state.currentId = state.projects.length ? state.projects[0].id : null;
      }
    } catch(err){
      alert('讀取 Google Sheet 資料失敗：' + err.message);
    } finally {
      setSyncing(false);
      render();
    }
  }

  // ---------- project actions ----------
  async function addProject(){
    const name = prompt('這次出遊/專案叫什麼名字？', '');
    if(!name) return;
    const id = uid();
    if(API_URL){
      const data = await callApi('createProject', { id, name: name.trim() });
      if(!data) return;
      state.projects = data.projects;
    } else {
      state.projects.push({ id, name: name.trim(), members: [], expenses: [] });
    }
    state.currentId = id;
    render();
  }
  async function deleteProject(id, ev){
    ev.stopPropagation();
    if(!confirm('刪除這個專案？裡面的成員與明細也會一併刪除。')) return;
    if(API_URL){
      const data = await callApi('deleteProject', { id });
      if(!data) return;
      state.projects = data.projects;
    } else {
      state.projects = state.projects.filter(p => p.id !== id);
    }
    if(state.currentId === id){
      state.currentId = state.projects.length ? state.projects[0].id : null;
    }
    render();
  }
  function selectProject(id){
    state.currentId = id;
    editingSplit = new Set();
    render();
  }

  // ---------- member actions ----------
  async function addMember(name){
    const p = currentProject();
    if(!p || !name.trim()) return;
    if(p.members.includes(name.trim())) return;
    if(API_URL){
      const data = await callApi('addMember', { projectId: p.id, name: name.trim() });
      if(!data) return;
      state.projects = data.projects;
    } else {
      p.members.push(name.trim());
    }
    render();
  }
  async function removeMember(name){
    const p = currentProject();
    if(!p) return;
    if(!confirm('移除「'+name+'」？此人過去的消費紀錄仍會保留，但無法再被指定為新支出的對象。')) return;
    if(API_URL){
      const data = await callApi('removeMember', { projectId: p.id, name });
      if(!data) return;
      state.projects = data.projects;
    } else {
      p.members = p.members.filter(m => m !== name);
    }
    render();
  }

  // ---------- expense actions ----------
  async function addExpense(item, amount, payer, splitAmong, date){
    const p = currentProject();
    if(!p) return;
    if(!item.trim() || !amount || amount <= 0 || !payer || splitAmong.length === 0) {
      alert('請填寫項目、金額、付款人，並至少選一位分攤對象');
      return;
    }
    const id = uid();
    const finalDate = date || new Date().toISOString().slice(0,10);
    if(API_URL){
      const data = await callApi('addExpense', { id, projectId: p.id, item: item.trim(), amount: Number(amount), payer, splitAmong: [...splitAmong], date: finalDate });
      if(!data) return;
      state.projects = data.projects;
    } else {
      p.expenses.push({ id, item: item.trim(), amount: Number(amount), payer, splitAmong: [...splitAmong], date: finalDate });
    }
    editingSplit = new Set();
    render();
  }
  async function deleteExpense(id){
    const p = currentProject();
    if(!p) return;
    if(API_URL){
      const data = await callApi('deleteExpense', { id });
      if(!data) return;
      state.projects = data.projects;
    } else {
      p.expenses = p.expenses.filter(e => e.id !== id);
    }
    render();
  }


  // ---------- settlement math ----------
  function computeBalances(p){
    const balances = {};
    p.members.forEach(m => balances[m] = 0);
    p.expenses.forEach(e => {
      if(balances[e.payer] === undefined) balances[e.payer] = 0;
      balances[e.payer] += e.amount;
      const share = e.amount / e.splitAmong.length;
      e.splitAmong.forEach(m => {
        if(balances[m] === undefined) balances[m] = 0;
        balances[m] -= share;
      });
    });
    return balances;
  }
  function simplifySettlement(balances){
    const creditors = [];
    const debtors = [];
    Object.entries(balances).forEach(([name, bal]) => {
      const rounded = Math.round(bal * 100) / 100;
      if(rounded > 0.5) creditors.push({ name, amt: rounded });
      else if(rounded < -0.5) debtors.push({ name, amt: -rounded });
    });
    creditors.sort((a,b) => b.amt - a.amt);
    debtors.sort((a,b) => b.amt - a.amt);
    const transfers = [];
    let i = 0, j = 0;
    while(i < debtors.length && j < creditors.length){
      const pay = Math.min(debtors[i].amt, creditors[j].amt);
      transfers.push({ from: debtors[i].name, to: creditors[j].name, amount: pay });
      debtors[i].amt -= pay;
      creditors[j].amt -= pay;
      if(debtors[i].amt < 0.5) i++;
      if(creditors[j].amt < 0.5) j++;
    }
    return transfers;
  }

  // ---------- render ----------
  function render(){
    renderRail();
    renderMain();
  }

  function renderRail(){
    const rail = document.getElementById('projectRail');
    rail.innerHTML = '';

    if(isGuest){
      // guest view: no switcher, no way to see or reach other projects
      const p = currentProject();
      const label = document.createElement('div');
      label.style.fontSize = '13px';
      label.style.color = 'var(--ink-soft)';
      label.textContent = p ? ('目前查看專案：' + p.name) : '找不到這個專案，連結可能有誤或已被刪除';
      rail.appendChild(label);
      return;
    }

    state.projects.forEach(p => {
      const tab = document.createElement('div');
      tab.className = 'project-tab' + (p.id === state.currentId ? ' active' : '');
      tab.innerHTML = escapeHtml(p.name) + ' <span class="share" title="複製分享連結">🔗</span><span class="del">✕</span>';
      tab.onclick = () => selectProject(p.id);
      tab.querySelector('.del').onclick = (ev) => deleteProject(p.id, ev);
      tab.querySelector('.share').onclick = (ev) => copyShareLink(p, ev);
      rail.appendChild(tab);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'add-project';
    addBtn.textContent = '+ 新增專案';
    addBtn.onclick = addProject;
    rail.appendChild(addBtn);
  }

  function copyShareLink(p, ev){
    ev.stopPropagation();
    if(!API_URL){
      alert('請先在程式碼最上方設定 API_URL（連上 Google Sheet）之後才能分享連結，不然朋友打開時看不到任何資料。');
      return;
    }
    const link = location.origin + location.pathname + '?project=' + encodeURIComponent(p.id);
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(link).then(
        () => alert('分享連結已複製：\n' + link),
        () => prompt('複製這個連結給朋友：', link)
      );
    } else {
      prompt('複製這個連結給朋友：', link);
    }
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderMain(){
    const main = document.getElementById('mainArea');
    const p = currentProject();
    if(!p){
      main.innerHTML = '<div class="empty">還沒有專案 —— 點上方「+ 新增專案」開始建立第一次出遊的帳本。</div>';
      return;
    }

    main.innerHTML = '';

    // ---- members panel ----
    const memberPanel = document.createElement('div');
    memberPanel.className = 'panel';
    memberPanel.innerHTML = `
      <p class="section-label">成員</p>
      <div class="members-row" id="membersRow"></div>
      <div class="add-member-form">
        <input type="text" id="newMemberInput" placeholder="輸入姓名後按 Enter">
        <button class="ghost" id="addMemberBtn">加入</button>
      </div>
    `;
    main.appendChild(memberPanel);

    const membersRow = memberPanel.querySelector('#membersRow');
    if(p.members.length === 0){
      membersRow.innerHTML = '<span style="font-size:13px;color:var(--ink-soft);">尚未新增成員</span>';
    } else {
      p.members.forEach(m => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = escapeHtml(m) + ' <span class="x">✕</span>';
        chip.querySelector('.x').onclick = () => removeMember(m);
        membersRow.appendChild(chip);
      });
    }
    const newMemberInput = memberPanel.querySelector('#newMemberInput');
    memberPanel.querySelector('#addMemberBtn').onclick = () => {
      addMember(newMemberInput.value);
    };
    newMemberInput.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){ addMember(newMemberInput.value); }
    });

    main.appendChild(makeTear());

    // ---- add expense panel ----
    const expensePanel = document.createElement('div');
    expensePanel.className = 'panel';
    expensePanel.innerHTML = `<p class="section-label">新增支出</p>`;
    const form = document.createElement('div');
    form.className = 'expense-form';

    const itemInput = document.createElement('input');
    itemInput.type = 'text'; itemInput.placeholder = '項目，例如：晚餐、住宿';
    const amountInput = document.createElement('input');
    amountInput.type = 'number'; amountInput.placeholder = '金額'; amountInput.min = '0';
    const dateInput = document.createElement('input');
    dateInput.type = 'date'; dateInput.value = new Date().toISOString().slice(0,10);

    const payerSelect = document.createElement('select');
    payerSelect.innerHTML = '<option value="">付款人 —</option>' +
      p.members.map(m => `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join('');

    const row1 = document.createElement('div');
    row1.className = 'row-2col';
    row1.appendChild(itemInput);
    row1.appendChild(amountInput);
    form.appendChild(row1);

    form.appendChild(dateInput);

    const payerWrap = document.createElement('div');
    const payerLabel = document.createElement('div');
    payerLabel.style.fontSize = '12px';
    payerLabel.style.color = 'var(--ink-soft)';
    payerLabel.style.marginBottom = '6px';
    payerLabel.textContent = '誰付的錢？';
    payerWrap.appendChild(payerLabel);
    payerWrap.appendChild(payerSelect);
    form.appendChild(payerWrap);

    const splitBlock = document.createElement('div');
    splitBlock.className = 'split-block';
    const splitLabel = document.createElement('div');
    splitLabel.style.fontSize = '12px';
    splitLabel.style.color = 'var(--ink-soft)';
    splitLabel.style.marginBottom = '2px';
    splitLabel.textContent = '要分攤給誰？（可複選，預設全選）';
    splitBlock.appendChild(splitLabel);
    const splitOptions = document.createElement('div');
    splitOptions.className = 'split-options';
    if(editingSplit.size === 0 && p.members.length){
      p.members.forEach(m => editingSplit.add(m));
    }
    p.members.forEach(m => {
      const pill = document.createElement('span');
      pill.className = 'split-pill' + (editingSplit.has(m) ? ' on' : '');
      pill.textContent = m;
      pill.onclick = () => {
        if(editingSplit.has(m)) editingSplit.delete(m); else editingSplit.add(m);
        pill.classList.toggle('on');
      };
      splitOptions.appendChild(pill);
    });
    splitBlock.appendChild(splitOptions);
    form.appendChild(splitBlock);

    const actions = document.createElement('div');
    actions.className = 'actions';
    const addBtn = document.createElement('button');
    addBtn.className = 'primary';
    addBtn.textContent = '加入這筆支出';
    addBtn.onclick = () => {
      addExpense(itemInput.value, amountInput.value, payerSelect.value, [...editingSplit], dateInput.value);
    };
    actions.appendChild(addBtn);
    form.appendChild(actions);

    expensePanel.appendChild(form);
    main.appendChild(expensePanel);

    main.appendChild(makeTear());

    // ---- receipt list ----
    const receiptPanel = document.createElement('div');
    receiptPanel.className = 'panel';
    receiptPanel.innerHTML = `<p class="section-label">支出明細</p>`;
    const receipt = document.createElement('div');
    receipt.className = 'receipt';
    if(p.expenses.length === 0){
      receipt.innerHTML = '<div class="receipt-empty">還沒有任何支出紀錄</div>';
    } else {
      [...p.expenses].sort((a,b) => a.date < b.date ? 1 : -1).forEach(e => {
        const row = document.createElement('div');
        row.className = 'expense-card';
        row.innerHTML = `
          <div class="expense-card-top">
            <span class="item">${escapeHtml(e.item)}</span>
            <span class="amount">${fmt(e.amount)}</span>
          </div>
          <div class="expense-card-meta">${fmtDate(e.date)}・${escapeHtml(e.payer)} 付款・${e.splitAmong.length} 人分攤</div>
          <div class="expense-card-split">分攤：${e.splitAmong.map(escapeHtml).join('、')}</div>
          <div class="expense-card-bottom"><span class="del">刪除</span></div>
        `;
        row.querySelector('.del').onclick = () => deleteExpense(e.id);
        receipt.appendChild(row);
      });
    }
    receiptPanel.appendChild(receipt);
    main.appendChild(receiptPanel);

    main.appendChild(makeTear());

    // ---- settlement ----
    const balances = computeBalances(p);
    const transfers = simplifySettlement(balances);

    const settlePanel = document.createElement('div');
    settlePanel.className = 'panel';
    settlePanel.innerHTML = `<p class="section-label">結算</p>`;

    const grid = document.createElement('div');
    grid.className = 'grid-two';

    const balCol = document.createElement('div');
    const balTitle = document.createElement('div');
    balTitle.style.fontSize = '13px';
    balTitle.style.color = 'var(--ink-soft)';
    balTitle.style.marginBottom = '6px';
    balTitle.textContent = '每人餘額';
    balCol.appendChild(balTitle);
    p.members.forEach(m => {
      const bal = balances[m] || 0;
      const rounded = Math.round(bal * 100) / 100;
      const row = document.createElement('div');
      row.className = 'balance-row';
      const cls = rounded > 0.5 ? 'pos' : rounded < -0.5 ? 'neg' : 'zero';
      const sign = rounded > 0.5 ? '應收 ' : rounded < -0.5 ? '應付 ' : '已結清';
      row.innerHTML = `<span class="name">${escapeHtml(m)}</span><span class="val ${cls}">${rounded === 0 ? '已結清' : sign + fmt(Math.abs(rounded))}</span>`;
      balCol.appendChild(row);
    });
    grid.appendChild(balCol);

    const transferCol = document.createElement('div');
    const transferTitle = document.createElement('div');
    transferTitle.style.fontSize = '13px';
    transferTitle.style.color = 'var(--ink-soft)';
    transferTitle.style.marginBottom = '6px';
    transferTitle.textContent = '建議轉帳（已簡化為最少筆數）';
    transferCol.appendChild(transferTitle);
    if(transfers.length === 0){
      const done = document.createElement('div');
      done.style.fontSize = '13.5px';
      done.style.color = 'var(--ink-soft)';
      done.innerHTML = p.expenses.length ? '大家都結清了 <span class="stamp">已結清</span>' : '尚無需要結算的款項';
      transferCol.appendChild(done);
    } else {
      const list = document.createElement('div');
      list.className = 'transfer-list';
      transfers.forEach(t => {
        const row = document.createElement('div');
        row.className = 'transfer';
        row.innerHTML = `<span>${escapeHtml(t.from)}</span><span class="arrow">→</span><span>${escapeHtml(t.to)}</span><span class="amt">${fmt(t.amount)}</span>`;
        list.appendChild(row);
      });
      transferCol.appendChild(list);
    }
    grid.appendChild(transferCol);

    settlePanel.appendChild(grid);
    main.appendChild(settlePanel);
  }

  function makeTear(){
    const d = document.createElement('div');
    d.className = 'tear';
    return d;
  }

  renderSyncStatus();
  loadFromSheet();
})();
</script>
</body>
</html>
